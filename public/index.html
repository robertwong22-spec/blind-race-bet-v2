<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet Calculator</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    
    .calculator {
      background: #1e3a5f;
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    h2 {
      color: #ffd700;
      text-align: center;
      margin: 0 0 25px 0;
      font-size: 28px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: #a0a0a0;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }
    
    .bet-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .bet-input {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-family: monospace;
      background: #fff;
    }
    
    .bet-status {
      font-size: 20px;
      width: 24px;
      text-align: center;
    }
    
    .bet-status.valid {
      color: #4CAF50;
    }
    
    .bet-status.invalid {
      color: #f44336;
    }
    
    .bet-status.empty {
      color: transparent;
    }
    
    #betContainer {
      margin-bottom: 20px;
    }
    
    .total-display {
      background: #ffd700;
      color: #1a1a2e;
      text-align: center;
      padding: 20px;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    
    .submit-btn {
      background: #ffa500;
      color: #1a1a2e;
      border: none;
      padding: 15px 40px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 165, 0, 0.4);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>🏇</h2>
    
    <div class="input-group">
      <label>Your name:</label>
      <input type="text" id="nameInput" placeholder="Enter your name">
    </div>
    
    <div class="input-group">
      <label>Your bet:</label>
      <div id="betContainer"></div>
    </div>
    
    <div class="total-display" id="totalDisplay">Total: $0</div>
    
    <button class="submit-btn">Submit Bet</button>
  </div>

  <script>
    const betContainer = document.getElementById('betContainer');

    function countUniqueHorses(str) {
      return new Set(str.split('')).size;
    }

    function calculateQuinellaDash(left, right) {
      const leftHorses = new Set(left.split(''));
      const rightHorses = new Set(right.split(''));
      let count = 0;
      for (const l of leftHorses) {
        for (const r of rightHorses) {
          if (l !== r) count++;
        }
      }
      return count / 2 + countCommon(leftHorses, rightHorses);
    }

    function countCommon(setA, setB) {
      let count = 0;
      for (const item of setA) {
        if (setB.has(item)) count++;
      }
      return count;
    }

    function calculateForecast(left, right) {
      const leftHorses = new Set(left.split(''));
      const rightHorses = new Set(right.split(''));
      let count = 0;
      for (const l of leftHorses) {
        for (const r of rightHorses) {
          if (l !== r) count++;
        }
      }
      return count;
    }

    function createBetRow(value = '') {
      const row = document.createElement('div');
      row.className = 'bet-row';
      
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'bet-input';
      input.placeholder = 'e.g. 567ab W10';
      input.value = value;
      
      const status = document.createElement('span');
      status.className = 'bet-status empty';
      
      row.appendChild(input);
      row.appendChild(status);
      
      input.addEventListener('input', handleBetInput);
      input.addEventListener('keydown', handleBetKeydown);
      
      return row;
    }

    function handleBetInput(e) {
      updateAllBets();
      
      const rows = betContainer.querySelectorAll('.bet-row');
      const lastRow = rows[rows.length - 1];
      const lastInput = lastRow.querySelector('.bet-input');
      
      if (e.target === lastInput && e.target.value.trim() !== '') {
        betContainer.appendChild(createBetRow());
      }
    }

    function handleBetKeydown(e) {
      if (e.key === 'Backspace' && e.target.value === '') {
        const rows = betContainer.querySelectorAll('.bet-row');
        if (rows.length > 1) {
          const currentRow = e.target.closest('.bet-row');
          const rowIndex = Array.from(rows).indexOf(currentRow);
          
          if (rowIndex > 0) {
            currentRow.remove();
            const prevInput = betContainer.querySelectorAll('.bet-input')[rowIndex - 1];
            prevInput.focus();
            updateAllBets();
            e.preventDefault();
          }
        }
      }
      
      if (e.key === 'Enter') {
        const rows = betContainer.querySelectorAll('.bet-row');
        const currentRow = e.target.closest('.bet-row');
        const rowIndex = Array.from(rows).indexOf(currentRow);
        
        if (rowIndex === rows.length - 1 && e.target.value.trim() !== '') {
          betContainer.appendChild(createBetRow());
        }
        
        const nextInput = betContainer.querySelectorAll('.bet-input')[rowIndex + 1];
        if (nextInput) {
          nextInput.focus();
        }
        e.preventDefault();
      }
    }

    function parseBetLine(line) {
      let cleaned = line.replace(/\s+/g, '');
      if (!cleaned) return { total: 0, valid: null };
      
      const match = cleaned.match(/^([0-9a-l]+)(?:-([0-9a-l]+))?([WwQqTtF])?(\d+)?$/);
      
      if (!match) return { total: 0, valid: false };
      
      const leftSide = match[1].toLowerCase();
      const rightSide = match[2] ? match[2].toLowerCase() : null;
      let betType = match[3] ? match[3].toUpperCase() : null;
      const amount = match[4] ? parseInt(match[4], 10) : 10;
      
      const hasDash = rightSide !== null;
      
      if (!betType) {
        betType = hasDash ? 'Q' : 'W';
      }
      
      let combinations = 0;
      
      switch (betType) {
        case 'W':
          combinations = countUniqueHorses(leftSide);
          break;
        case 'Q':
          if (hasDash) {
            combinations = calculateQuinellaDash(leftSide, rightSide);
          } else {
            const n = countUniqueHorses(leftSide);
            if (n < 2) return { total: 0, valid: false };
            combinations = (n * (n - 1)) / 2;
          }
          break;
        case 'F':
          if (hasDash) {
            combinations = calculateForecast(leftSide, rightSide);
          } else {
            return { total: 0, valid: false };
          }
          break;
        case 'T':
          if (hasDash) {
            const rightCount = countUniqueHorses(rightSide);
            if (rightCount < 2) return { total: 0, valid: false };
            combinations = (rightCount * (rightCount - 1)) / 2;
          } else {
            return { total: 0, valid: false };
          }
          break;
      }
      
      if (combinations === 0) return { total: 0, valid: false };
      
      return { total: combinations * amount, valid: true };
    }

    function updateAllBets() {
      const inputs = betContainer.querySelectorAll('.bet-input');
      let grandTotal = 0;
      
      inputs.forEach(input => {
        const row = input.closest('.bet-row');
        const status = row.querySelector('.bet-status');
        const result = parseBetLine(input.value);
        
        grandTotal += result.total;
        
        if (result.valid === null) {
          status.textContent = '';
          status.className = 'bet-status empty';
        } else if (result.valid) {
          status.textContent = '✓';
          status.className = 'bet-status valid';
        } else {
          status.textContent = '✗';
          status.className = 'bet-status invalid';
        }
      });
      
      document.getElementById('totalDisplay').textContent = `Total: $${grandTotal}`;
    }

    // Initialize with one empty row
    betContainer.appendChild(createBetRow());
  </script>
</body>
</html>
