<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bet Calculator</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    
    .calculator {
      background: #1e3a5f;
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    h2 {
      color: #ffd700;
      text-align: center;
      margin: 0 0 25px 0;
      font-size: 28px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: #a0a0a0;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }
    
    textarea {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-family: monospace;
      resize: vertical;
      min-height: 120px;
    }
    
    .error-display {
      background: #2a4a6f;
      border-radius: 10px;
      padding: 10px 15px;
      margin-top: 10px;
      display: none;
    }
    
    .error-display.has-errors {
      display: block;
    }
    
    .error-line {
      color: #f44336;
      font-size: 14px;
      margin: 4px 0;
    }
    
    .total-display {
      background: #ffd700;
      color: #1a1a2e;
      text-align: center;
      padding: 20px;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    
    .submit-btn {
      background: #ffa500;
      color: #1a1a2e;
      border: none;
      padding: 15px 40px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 165, 0, 0.4);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>🏇</h2>
    
    <div class="input-group">
      <label>Your name:</label>
      <input type="text" id="nameInput" placeholder="Enter your name">
    </div>
    
    <div class="input-group">
      <label>Your bet:</label>
      <textarea id="betInput" placeholder="e.g. 567ab W10"></textarea>
      <div class="error-display" id="errorDisplay"></div>
    </div>
    
    <div class="total-display" id="totalDisplay">Total: $0</div>
    
    <button class="submit-btn">Submit Bet</button>
  </div>

  <script>
    const betInput = document.getElementById('betInput');
    const totalDisplay = document.getElementById('totalDisplay');
    const errorDisplay = document.getElementById('errorDisplay');

    function countUniqueHorses(str) {
      return new Set(str.split('')).size;
    }

    function calculateQuinellaDash(left, right) {
      const leftHorses = new Set(left.split(''));
      const rightHorses = new Set(right.split(''));
      let count = 0;
      for (const l of leftHorses) {
        for (const r of rightHorses) {
          if (l !== r) count++;
        }
      }
      return count / 2 + countCommon(leftHorses, rightHorses);
    }

    function countCommon(setA, setB) {
      let count = 0;
      for (const item of setA) {
        if (setB.has(item)) count++;
      }
      return count;
    }

    function calculateForecast(left, right) {
      const leftHorses = new Set(left.split(''));
      const rightHorses = new Set(right.split(''));
      let count = 0;
      for (const l of leftHorses) {
        for (const r of rightHorses) {
          if (l !== r) count++;
        }
      }
      return count;
    }

    function parseBetLine(line) {
      let cleaned = line.replace(/\s+/g, '');
      if (!cleaned) return { total: 0, valid: null };
      
      const match = cleaned.match(/^([0-9a-l]+)(?:-([0-9a-l]+))?([WwQqTtF])?(\d+)?$/);
      
      if (!match) return { total: 0, valid: false };
      
      const leftSide = match[1].toLowerCase();
      const rightSide = match[2] ? match[2].toLowerCase() : null;
      let betType = match[3] ? match[3].toUpperCase() : null;
      const amount = match[4] ? parseInt(match[4], 10) : 10;
      
      const hasDash = rightSide !== null;
      
      if (!betType) {
        betType = hasDash ? 'Q' : 'W';
      }
      
      let combinations = 0;
      
      switch (betType) {
        case 'W':
          combinations = countUniqueHorses(leftSide);
          break;
        case 'Q':
          if (hasDash) {
            combinations = calculateQuinellaDash(leftSide, rightSide);
          } else {
            const n = countUniqueHorses(leftSide);
            if (n < 2) return { total: 0, valid: false };
            combinations = (n * (n - 1)) / 2;
          }
          break;
        case 'F':
          if (hasDash) {
            combinations = calculateForecast(leftSide, rightSide);
          } else {
            return { total: 0, valid: false };
          }
          break;
        case 'T':
          if (hasDash) {
            const rightCount = countUniqueHorses(rightSide);
            if (rightCount < 2) return { total: 0, valid: false };
            combinations = (rightCount * (rightCount - 1)) / 2;
          } else {
            return { total: 0, valid: false };
          }
          break;
      }
      
      if (combinations === 0) return { total: 0, valid: false };
      
      return { total: combinations * amount, valid: true };
    }

    function updateTotal() {
      const lines = betInput.value.split('\n');
      let grandTotal = 0;
      let errors = [];
      
      lines.forEach((line, index) => {
        const result = parseBetLine(line);
        grandTotal += result.total;
        
        if (result.valid === false) {
          errors.push(`Line ${index + 1}: "${line.trim()}" ✗`);
        }
      });
      
      totalDisplay.textContent = `Total: $${grandTotal}`;
      
      if (errors.length > 0) {
        errorDisplay.innerHTML = errors.map(e => `<div class="error-line">${e}</div>`).join('');
        errorDisplay.classList.add('has-errors');
      } else {
        errorDisplay.innerHTML = '';
        errorDisplay.classList.remove('has-errors');
      }
    }

    betInput.addEventListener('input', updateTotal);
  </script>
</body>
</html>
